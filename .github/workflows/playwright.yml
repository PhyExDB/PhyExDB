name: Playwright Tests

on:
  release:
    types:
      - published
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs on new pushes to the same branch / PR
concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      DATABASE_URL: postgresql://nuxt:nuxt_password@localhost:5432/phyexdb
      # For API Base URL
      NUXT_PUBLIC_API_BASE: http://db:3000/api/
      BETTER_AUTH_SECRET: better_auth_secret

    services:
      db:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: phyexdb
          POSTGRES_USER: nuxt
          POSTGRES_PASSWORD: nuxt_password
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      mailpit:
        image: axllent/mailpit
        ports:
          - 8025:8025
          - 1025:1025
        env:
          MP_SMTP_AUTH_ACCEPT_ANY: true
          MP_SMTP_AUTH_ALLOW_INSECURE: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Create file upload directory
        run: mkdir -p /tmp/phyexdb-files/uploads

      - name: Run Playwright tests
        run: >
          npx playwright test
        timeout-minutes: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14

